services:
  - type: web
    name: shizuka-mongodb
    env: node
    buildCommand: npm install
    startCommand: node index.js
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
